<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  background-image:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.card{
  position:relative;
  width:320px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
  z-index:1;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:10px;
  background:#00c853;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#009624;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

  <h2> Login</h2>

  <input placeholder="Email">
  <input placeholder="Password">

  <!--  CONNECTED TO DONATION PAGE -->
  <button onclick="window.location.href='donate.html'">
    Login
  </button>

</div>

</body>
</html>
